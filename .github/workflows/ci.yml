name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: check + lint + unit + size
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate paraglide messages
        run: bunx paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide --silent

      - name: Type-check
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test:unit -- --run

      - name: Build
        run: bun run build

      - name: Size budget
        run: bun run size
