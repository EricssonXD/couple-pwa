<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />
		<!--
		  Pre-paint redirect for `/` and `/welcome`. Inlined (not external)
		  so it executes BEFORE the body parses with zero network/cache
		  fetch — a returning signed-in user opening the PWA cold (online
		  OR offline) never sees a frame of the welcome page. CSP `hash`
		  mode in svelte.config.js auto-hashes this tag.

		  Reads the client-readable `ds_auth` cookie set by
		  hooks.server.ts (no secrets — values: 'pulse', 'onboarding',
		  legacy '1' = pulse). Unknown values are treated as no session
		  so a corrupt cookie can't strand a real user.
		-->
		<script>
			(function () {
				var path = location.pathname;
				if (path !== '/' && path !== '/welcome') return;
				var match = document.cookie.match(/(?:^|;\s*)ds_auth=([^;]+)/);
				var hint = match ? match[1] : null;
				var dest = null;
				if (hint === 'onboarding') dest = '/onboarding';
				else if (hint === 'pulse' || hint === '1') dest = '/pulse';
				else if (path === '/') dest = '/welcome';
				if (dest && dest !== path) location.replace(dest);
			})();
		</script>
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="application-name" content="DuoSync" />
		<meta name="apple-mobile-web-app-title" content="DuoSync" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="theme-color" content="#faf6f1" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0e1424" media="(prefers-color-scheme: dark)" />
		<meta name="description" content="DuoSync — a private, real-time digital sanctuary for two." />

		<!-- DuoSync typography: Inter (UI) + Fraunces (display numerals). -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap"
		/>

		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<link rel="icon" href="%sveltekit.assets%/icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon-192.png" />
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
