<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />
		<!--
		  Pre-paint redirect for `/`. Runs synchronously before the body
		  parses so even when the SW serves the cached `/` HTML offline
		  the user never sees a flash of the wrong screen.
		    cookie missing  → /welcome  (cached marketing page)
		    cookie=onboarding → /onboarding
		    cookie=pulse / legacy "1" → /pulse
		  The cookie is set + cleared by hooks.server.ts; it's
		  client-readable but holds NO secrets — purely a routing flag.
		  Keep this script tiny + dependency-free — it must parse instantly.
		-->
		<script>
			(function () {
				if (location.pathname !== '/') return;
				var m = document.cookie.match(/(?:^|;\s*)ds_auth=([^;]+)/);
				var dest;
				if (!m) dest = '/welcome';
				else if (m[1] === 'onboarding') dest = '/onboarding';
				else dest = '/pulse';
				location.replace(dest);
			})();
		</script>
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="application-name" content="DuoSync" />
		<meta name="apple-mobile-web-app-title" content="DuoSync" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="theme-color" content="#faf6f1" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0e1424" media="(prefers-color-scheme: dark)" />
		<meta name="description" content="DuoSync — a private, real-time digital sanctuary for two." />

		<!-- DuoSync typography: Inter (UI) + Fraunces (display numerals). -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap"
		/>

		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<link rel="icon" href="%sveltekit.assets%/icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon-192.png" />
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
